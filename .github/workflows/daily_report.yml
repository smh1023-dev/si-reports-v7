name: Daily SI Investment Report

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore story cache
        uses: actions/cache@v4
        with:
          path: .story_cache
          key: story-cache-${{ github.run_id }}
          restore-keys: |
            story-cache-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate reports
        env:
          TZ: Asia/Seoul
          PYTHONUNBUFFERED: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p output
          python report_generator.py --output-dir output

      - name: Verify output
        run: |
          ls -la output/
          for f in si_investment_report.html us_premium_report.html korea_premium_report.html; do
            if [ ! -f "output/$f" ]; then
              echo "::error::$f not generated"
              exit 1
            fi
            size=$(stat -c%s "output/$f")
            if [ "$size" -lt 10000 ]; then
              echo "::error::$f too small ($size bytes)"
              exit 1
            fi
            echo "✓ $f ($size bytes)"
          done

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp output/si_investment_report.html _site/index.html
          cp output/si_investment_report.html _site/si_investment_report.html
          cp output/us_premium_report.html _site/us_premium_report.html
          cp output/korea_premium_report.html _site/korea_premium_report.html
          # 포트폴리오 모듈 (있을 때만 복사)
          [ -f output/portfolio_prices.json ] && cp output/portfolio_prices.json _site/portfolio_prices.json || echo "portfolio_prices.json 없음(생략)"
          [ -f portfolio.html ] && cp portfolio.html _site/portfolio.html || echo "portfolio.html 없음(생략)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
